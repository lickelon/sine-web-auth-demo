{% extends "base.html" %}

{% block content %}
<section class="panel profile-panel">
    <div class="panel-copy">
        <span class="eyebrow">Profile</span>
        <h1>{{ user.nickname }} 님</h1>
        <p>로그인된 사용자에게만 보이는 간단한 프로필 화면입니다.</p>
    </div>

    <dl class="profile-grid">
        <div class="profile-item">
            <dt>회원 번호</dt>
            <dd>{{ user.id }}</dd>
        </div>
        <div class="profile-item">
            <dt>아이디</dt>
            <dd>{{ user.username }}</dd>
        </div>
        <div class="profile-item">
            <dt>닉네임</dt>
            <dd>{{ user.nickname }}</dd>
        </div>
        <div class="profile-item">
            <dt>가입 시각</dt>
            <dd>{{ created_at_display }}</dd>
        </div>
    </dl>
</section>
{% endblock %}
