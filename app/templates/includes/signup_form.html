<div id="signup-form-area">
    <form
        method="post"
        class="auth-form"
        hx-post="/signup"
        hx-target="#signup-form-area"
        hx-swap="outerHTML"
    >
        {% if errors.get("form") %}
            <div class="feedback feedback-error">{{ errors["form"] }}</div>
        {% endif %}

        <label class="field">
            <span>아이디</span>
            <input
                type="text"
                name="username"
                value="{{ form.username }}"
                autocomplete="username"
                placeholder="sine_user"
                hx-get="/signup/username-check"
                hx-trigger="input changed delay:400ms, blur"
                hx-target="#username-feedback"
                hx-swap="innerHTML"
                hx-indicator="#username-indicator"
            >
            <div class="field-meta">
                <div id="username-feedback">
                    {% include "includes/username_feedback.html" %}
                </div>
                <span id="username-indicator" class="field-indicator htmx-indicator">확인 중...</span>
            </div>
        </label>

        <label class="field">
            <span>비밀번호</span>
            <input
                type="password"
                name="password"
                autocomplete="new-password"
                placeholder="8자 이상 입력"
            >
            {% if errors.get("password") %}
                <small class="field-error">{{ errors["password"] }}</small>
            {% endif %}
        </label>

        <label class="field">
            <span>닉네임</span>
            <input
                type="text"
                name="nickname"
                value="{{ form.nickname }}"
                autocomplete="nickname"
                placeholder="표시할 이름"
            >
            {% if errors.get("nickname") %}
                <small class="field-error">{{ errors["nickname"] }}</small>
            {% endif %}
        </label>

        <button type="submit" class="primary-button">계정 만들기</button>
    </form>

    <p class="inline-link">이미 계정이 있나요? <a href="/login">로그인</a></p>
</div>
