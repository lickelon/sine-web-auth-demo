<div id="login-form-area">
    <form
        method="post"
        class="auth-form"
        hx-post="/login"
        hx-target="#login-form-area"
        hx-swap="outerHTML"
    >
        {% if message %}
            <div class="feedback feedback-success">{{ message }}</div>
        {% endif %}
        {% if errors.get("form") %}
            <div class="feedback feedback-error">{{ errors["form"] }}</div>
        {% endif %}

        <label class="field">
            <span>아이디</span>
            <input
                type="text"
                name="username"
                value="{{ form.username }}"
                autocomplete="username"
                placeholder="sine_user"
            >
            {% if errors.get("username") %}
                <small class="field-error">{{ errors["username"] }}</small>
            {% endif %}
        </label>

        <label class="field">
            <span>비밀번호</span>
            <input
                type="password"
                name="password"
                autocomplete="current-password"
                placeholder="비밀번호 입력"
            >
            {% if errors.get("password") %}
                <small class="field-error">{{ errors["password"] }}</small>
            {% endif %}
        </label>

        <button type="submit" class="primary-button">로그인</button>
    </form>

    <p class="inline-link">처음이신가요? <a href="/signup">회원가입</a></p>
</div>
